# Apache Alias Configuration for EBP Products
# Add this to C:\xampp\apache\conf\httpd.conf or include it

# Enable mod_alias (usually already enabled in XAMPP)

# EBP Products Aliases
Alias /kewer "C:/xampp/htdocs/EBP/PLATFORM_BISNIS_ENTERPRISE/PRODUCTS/KEWER"
Alias /mywisata "C:/xampp/htdocs/EBP/PLATFORM_BISNIS_ENTERPRISE/PRODUCTS/MY_WISATA"
Alias /panglong "C:/xampp/htdocs/EBP/PLATFORM_BISNIS_ENTERPRISE/PRODUCTS/PANGLONG"
Alias /saham "C:/xampp/htdocs/EBP/PLATFORM_BISNIS_ENTERPRISE/PRODUCTS/SAHAM"
Alias /restauran "C:/xampp/htdocs/EBP/PLATFORM_BISNIS_ENTERPRISE/PRODUCTS/RESTAURANT_ERP"

# Directory permissions for each product
<Directory "C:/xampp/htdocs/EBP/PLATFORM_BISNIS_ENTERPRISE/PRODUCTS/KEWER">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

<Directory "C:/xampp/htdocs/EBP/PLATFORM_BISNIS_ENTERPRISE/PRODUCTS/MY_WISATA">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

<Directory "C:/xampp/htdocs/EBP/PLATFORM_BISNIS_ENTERPRISE/PRODUCTS/PANGLONG">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

<Directory "C:/xampp/htdocs/EBP/PLATFORM_BISNIS_ENTERPRISE/PRODUCTS/SAHAM">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

<Directory "C:/xampp/htdocs/EBP/PLATFORM_BISNIS_ENTERPRISE/PRODUCTS/RESTAURANT_ERP">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>
