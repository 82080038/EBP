[pytest]
addopts =
    --ignore=tests/test_command_center_e2e.py
    --ignore=tests/test_tabs_data.py
    --ignore=tests/test_api_comprehensive.py
filterwarnings =
    ignore::UserWarning:sklearn.utils.validation
    ignore:X does not have valid feature names:UserWarning
    ignore::DeprecationWarning:starlette.testclient
    ignore::DeprecationWarning:fastapi.testclient
    ignore:Using.*httpx.*deprecated:Warning
