<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBP Restaurant ERP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .landing-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .dev-login-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 300px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 3px solid #ff6b6b;
        }
        .dev-login-panel h3 {
            color: #ff6b6b;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .dev-login-panel p {
            color: #666;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .dev-login-select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .dev-login-btn {
            width: 100%;
            padding: 10px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .dev-login-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }
        .dev-login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e9ecef;
        }
        .btn-secondary:hover {
            background: #e9ecef;
        }
        .loading {
            display: none;
            margin-top: 20px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .role-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .role-guest {
            background: #e9ecef;
            color: #666;
        }
        .role-tenant {
            background: #d4edda;
            color: #155724;
        }
        .role-consumer {
            background: #cce5ff;
            color: #004085;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="landing-container">
            <div class="logo">🍽️</div>
            <h1>EBP Restaurant ERP</h1>
            <p>Welcome to the Enterprise Business Platform Restaurant Management System</p>
            
            <div id="roleInfo">
                <span class="role-badge role-guest" id="roleBadge">Guest</span>
            </div>
            
            <div class="btn-group" id="btnGroup">
                <a href="consumer/index.html" class="btn btn-primary">
                    🍔 Browse as Consumer
                </a>
                <a href="dashboard/index.html" class="btn btn-secondary">
                    👨‍💼 Admin Dashboard
                </a>
                <a href="kiosk/index.html" class="btn btn-secondary">
                    🖥️ Kiosk Mode
                </a>
                <a href="mobile/index.html" class="btn btn-secondary">
                    📱 Mobile Waiter
                </a>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px; font-size: 14px;">Checking authentication...</p>
            </div>
        </div>

        <!-- Development Quick Login Panel -->
        <div class="dev-login-panel">
            <h3>⚠️ Development Only</h3>
            <p>Quick login for testing purposes. Remove in production.</p>
            
            <select class="dev-login-select" id="devUserSelect">
                <option value="">-- Select User --</option>
                <optgroup label="Tenant/Staff Roles">
                    <option value="sim_admin">Administrator (Level 100)</option>
                    <option value="sim_manager">Manager (Level 80)</option>
                    <option value="sim_kasir">Kasir (Level 50)</option>
                    <option value="sim_koki">Koki (Level 40)</option>
                    <option value="sim_waiter">Waiter (Level 30)</option>
                    <option value="sim_stok">Stok (Level 20)</option>
                </optgroup>
                <optgroup label="Consumer Roles">
                    <option value="consumer_guest">Consumer Guest</option>
                    <option value="consumer_premium">Consumer Premium</option>
                </optgroup>
            </select>
            
            <button class="dev-login-btn" id="devLoginBtn" disabled>
                Quick Login
            </button>
            
            <button class="dev-login-btn" id="devLogoutBtn" style="background: #6c757d; margin-top: 10px;">
                Logout
            </button>
        </div>
    </div>

    <script>
        // Development user credentials
        const devUsers = {
            sim_admin: { username: 'sim_admin', password: 'Sim123456', role: 'Administrator', level: 100, type: 'tenant' },
            sim_manager: { username: 'sim_manager', password: 'Sim123456', role: 'Manager', level: 80, type: 'tenant' },
            sim_kasir: { username: 'sim_kasir', password: 'Sim123456', role: 'Kasir', level: 50, type: 'tenant' },
            sim_koki: { username: 'sim_koki', password: 'Sim123456', role: 'Koki', level: 40, type: 'tenant' },
            sim_waiter: { username: 'sim_waiter', password: 'Sim123456', role: 'Waiter', level: 30, type: 'tenant' },
            sim_stok: { username: 'sim_stok', password: 'Sim123456', role: 'Stok', level: 20, type: 'tenant' },
            consumer_guest: { username: 'consumer_guest', password: 'Guest123', role: 'Consumer', level: 1, type: 'consumer' },
            consumer_premium: { username: 'consumer_premium', password: 'Premium123', role: 'Premium Consumer', level: 5, type: 'consumer' }
        };

        // Development quick login
        async function devQuickLogin(userKey) {
            const user = devUsers[userKey];
            if (!user) return;

            const devLoginBtn = document.getElementById('devLoginBtn');
            devLoginBtn.disabled = true;
            devLoginBtn.textContent = 'Logging in...';

            try {
                // Call backend API for authentication
                const response = await fetch('http://localhost:8000/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: user.username,
                        password: user.password
                    })
                });

                const data = await response.json();

                if (response.ok && data.access_token) {
                    // Store user data in localStorage
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user_role', user.role);
                    localStorage.setItem('user_type', user.type);
                    localStorage.setItem('user_level', user.level);
                    localStorage.setItem('user_id', data.user?.id || user.username);
                    localStorage.setItem('currentUser', JSON.stringify({
                        name: user.role,
                        username: user.username,
                        role: user.role,
                        type: user.type,
                        level: user.level
                    }));

                    // Refresh the page to trigger role-based redirect
                    window.location.reload();
                } else {
                    // If API fails, simulate login for development
                    console.warn('API login failed, using simulated login for development');
                    localStorage.setItem('access_token', 'dev_token_' + Date.now());
                    localStorage.setItem('user_role', user.role);
                    localStorage.setItem('user_type', user.type);
                    localStorage.setItem('user_level', user.level);
                    localStorage.setItem('user_id', user.username);
                    localStorage.setItem('currentUser', JSON.stringify({
                        name: user.role,
                        username: user.username,
                        role: user.role,
                        type: user.type,
                        level: user.level
                    }));

                    window.location.reload();
                }
            } catch (error) {
                console.error('Login error:', error);
                // Simulate login for development if API is not available
                localStorage.setItem('access_token', 'dev_token_' + Date.now());
                localStorage.setItem('user_role', user.role);
                localStorage.setItem('user_type', user.type);
                localStorage.setItem('user_level', user.level);
                localStorage.setItem('user_id', user.username);
                localStorage.setItem('currentUser', JSON.stringify({
                    name: user.role,
                    username: user.username,
                    role: user.role,
                    type: user.type,
                    level: user.level
                }));

                window.location.reload();
            }
        }

        // Development logout
        function devLogout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user_role');
            localStorage.removeItem('user_type');
            localStorage.removeItem('user_level');
            localStorage.removeItem('user_id');
            localStorage.removeItem('currentUser');
            localStorage.removeItem('token');
            
            document.getElementById('devUserSelect').value = '';
            document.getElementById('devLoginBtn').disabled = true;
            
            window.location.reload();
        }

        // Setup development login panel
        function setupDevLogin() {
            const devUserSelect = document.getElementById('devUserSelect');
            const devLoginBtn = document.getElementById('devLoginBtn');
            const devLogoutBtn = document.getElementById('devLogoutBtn');

            devUserSelect.addEventListener('change', () => {
                devLoginBtn.disabled = !devUserSelect.value;
            });

            devLoginBtn.addEventListener('click', () => {
                if (devUserSelect.value) {
                    devQuickLogin(devUserSelect.value);
                }
            });

            devLogoutBtn.addEventListener('click', devLogout);
        }

        // Check for authentication token in localStorage
        function checkAuth() {
            const token = localStorage.getItem('access_token');
            const userRole = localStorage.getItem('user_role');
            const userType = localStorage.getItem('user_type');
            
            const roleBadge = document.getElementById('roleBadge');
            const btnGroup = document.getElementById('btnGroup');
            const loading = document.getElementById('loading');
            
            // Show loading
            loading.style.display = 'block';
            btnGroup.style.display = 'none';
            
            setTimeout(() => {
                loading.style.display = 'none';
                btnGroup.style.display = 'flex';
                
                if (token && userRole) {
                    // User is logged in
                    if (userType === 'tenant' || ['Administrator', 'Manager', 'Kasir', 'Koki', 'Waiter', 'Stok'].includes(userRole)) {
                        // Tenant/Staff role - redirect to dashboard
                        roleBadge.textContent = 'Tenant/Staff: ' + userRole;
                        roleBadge.className = 'role-badge role-tenant';
                        
                        // Auto-redirect to dashboard after 2 seconds
                        setTimeout(() => {
                            window.location.href = 'dashboard/index.html';
                        }, 2000);
                        
                        // Update button to show auto-redirect
                        btnGroup.innerHTML = `
                            <p style="color: #155724; font-weight: 600;">
                                ✓ Logged in as ${userRole}<br>
                                <small>Redirecting to Dashboard...</small>
                            </p>
                            <a href="dashboard/index.html" class="btn btn-primary">
                                Go to Dashboard Now
                            </a>
                            <a href="consumer/index.html" class="btn btn-secondary">
                                Browse as Consumer Instead
                            </a>
                        `;
                    } else {
                        // Consumer role - show consumer app
                        roleBadge.textContent = 'Consumer: ' + userRole;
                        roleBadge.className = 'role-badge role-consumer';
                        
                        // Auto-redirect to consumer app after 2 seconds
                        setTimeout(() => {
                            window.location.href = 'consumer/index.html';
                        }, 2000);
                        
                        // Update button to show auto-redirect
                        btnGroup.innerHTML = `
                            <p style="color: #004085; font-weight: 600;">
                                ✓ Logged in as ${userRole}<br>
                                <small>Redirecting to Consumer App...</small>
                            </p>
                            <a href="consumer/index.html" class="btn btn-primary">
                                Go to Consumer App Now
                            </a>
                            <a href="dashboard/index.html" class="btn btn-secondary">
                                Go to Dashboard (if applicable)
                            </a>
                        `;
                    }
                } else {
                    // Guest mode
                    roleBadge.textContent = 'Guest';
                    roleBadge.className = 'role-badge role-guest';
                    
                    // Show default buttons
                    btnGroup.innerHTML = `
                        <a href="consumer/index.html" class="btn btn-primary">
                            🍔 Browse as Consumer
                        </a>
                        <a href="dashboard/index.html" class="btn btn-secondary">
                            👨‍💼 Admin Dashboard
                        </a>
                        <a href="kiosk/index.html" class="btn btn-secondary">
                            🖥️ Kiosk Mode
                        </a>
                        <a href="mobile/index.html" class="btn btn-secondary">
                            📱 Mobile Waiter
                        </a>
                    `;
                }
            }, 500);
        }
        
        // Run on page load
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            setupDevLogin();
        });
    </script>
</body>
</html>
